apiVersion: v1
kind: ServiceAccount
metadata:
  name: zuri-runtime-automation
  namespace: zuri-market
  labels:
    app.kubernetes.io/name: zuri-market
    demo.zuri-market/runtime-cluster: runtime-k3s-cluster
    demo.zuri-market/automation: enabled
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zuri-runtime-automation-role
  namespace: zuri-market
  labels:
    app.kubernetes.io/name: zuri-market
    demo.zuri-market/runtime-cluster: runtime-k3s-cluster
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zuri-runtime-automation-binding
  namespace: zuri-market
  labels:
    app.kubernetes.io/name: zuri-market
    demo.zuri-market/runtime-cluster: runtime-k3s-cluster
subjects:
  - kind: ServiceAccount
    name: zuri-runtime-automation
    namespace: zuri-market
roleRef:
  kind: Role
  name: zuri-runtime-automation-role
  apiGroup: rbac.authorization.k8s.io