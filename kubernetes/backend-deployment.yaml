apiVersion: apps/v1
kind: Deployment
metadata:
  name: zuri-backend
  namespace: zuri-market
  labels:
    app: zuri-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: zuri-backend
  template:
    metadata:
      labels:
        app: zuri-backend
    spec:
      containers:
        - name: zuri-backend
          image: temidev/zuriapp-backend:v3
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: zuri-backend-config
                  key: PORT
            - name: AWS_REGION
              value: "us-east-1"
            - name: AWS_SECRET_NAME
              value: "zuri-market/backend"
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"