apiVersion: v1
kind: Service
metadata:
  name: zuri-backend-service
  namespace: zuri-market
  labels:
    app: zuri-backend
    app.kubernetes.io/name: zuri-market
    app.kubernetes.io/component: backend
    demo.zuri-market/runtime-cluster: runtime-k3s-cluster
spec:
  selector:
    app: zuri-backend
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
  type: ClusterIP
