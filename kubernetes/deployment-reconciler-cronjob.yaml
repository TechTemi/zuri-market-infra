apiVersion: batch/v1
kind: CronJob
metadata:
  name: zuri-deployment-reconciler
  namespace: zuri-market
  labels:
    app.kubernetes.io/name: zuri-market
    demo.zuri-market/runtime-cluster: runtime-k3s-cluster
    demo.zuri-market/feature: deployment-self-healing
    demo.zuri-market/reconcile-every: "3-minutes"
spec:
  schedule: "*/3 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app.kubernetes.io/name: zuri-market
            demo.zuri-market/runtime-cluster: runtime-k3s-cluster
            demo.zuri-market/feature: deployment-self-healing
        spec:
          serviceAccountName: zuri-runtime-automation
          restartPolicy: Never
          containers:
            - name: deployment-reconciler
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -eux

                  echo "Running Zuri Market deployment reconciliation check."

                  if ! kubectl -n zuri-market get deployment zuri-backend >/dev/null 2>&1; then
                    echo "zuri-backend deployment is missing. Recreating it."

                    cat <<'BACKEND' | kubectl apply -f -
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: zuri-backend
                    namespace: zuri-market
                    labels:
                      app: zuri-backend
                      app.kubernetes.io/name: zuri-market
                      app.kubernetes.io/component: backend
                      demo.zuri-market/runtime-cluster: runtime-k3s-cluster
                      demo.zuri-market/recreated-by-reconciler: "true"
                  spec:
                    replicas: 2
                    selector:
                      matchLabels:
                        app: zuri-backend
                    template:
                      metadata:
                        labels:
                          app: zuri-backend
                          app.kubernetes.io/name: zuri-market
                          app.kubernetes.io/component: backend
                          demo.zuri-market/runtime-cluster: runtime-k3s-cluster
                          demo.zuri-market/recreated-by-reconciler: "true"
                      spec:
                        containers:
                          - name: zuri-backend
                            image: temidev/zuriapp-backend:v3
                            imagePullPolicy: Always
                            ports:
                              - containerPort: 5000
                            env:
                              - name: PORT
                                valueFrom:
                                  configMapKeyRef:
                                    name: zuri-backend-config
                                    key: PORT
                              - name: AWS_REGION
                                value: "us-east-1"
                              - name: AWS_SECRET_NAME
                                value: "zuri-market/backend"
                            readinessProbe:
                              httpGet:
                                path: /ready
                                port: 5000
                              initialDelaySeconds: 10
                              periodSeconds: 10
                              timeoutSeconds: 3
                              failureThreshold: 3
                            livenessProbe:
                              httpGet:
                                path: /health
                                port: 5000
                              initialDelaySeconds: 20
                              periodSeconds: 20
                              timeoutSeconds: 3
                              failureThreshold: 3
                            resources:
                              requests:
                                cpu: "100m"
                                memory: "128Mi"
                              limits:
                                cpu: "500m"
                                memory: "256Mi"
                  BACKEND
                  fi

                  if ! kubectl -n zuri-market get deployment zuri-frontend >/dev/null 2>&1; then
                    echo "zuri-frontend deployment is missing. Recreating it."

                    cat <<'FRONTEND' | kubectl apply -f -
                  apiVersion: apps/v1
                  kind: Deployment
                  metadata:
                    name: zuri-frontend
                    namespace: zuri-market
                    labels:
                      app: zuri-frontend
                      app.kubernetes.io/name: zuri-market
                      app.kubernetes.io/component: frontend
                      demo.zuri-market/runtime-cluster: runtime-k3s-cluster
                      demo.zuri-market/recreated-by-reconciler: "true"
                  spec:
                    replicas: 2
                    selector:
                      matchLabels:
                        app: zuri-frontend
                    template:
                      metadata:
                        labels:
                          app: zuri-frontend
                          app.kubernetes.io/name: zuri-market
                          app.kubernetes.io/component: frontend
                          demo.zuri-market/runtime-cluster: runtime-k3s-cluster
                          demo.zuri-market/recreated-by-reconciler: "true"
                      spec:
                        containers:
                          - name: zuri-frontend
                            image: temidev/zuriapp-frontend:v2
                            imagePullPolicy: Always
                            ports:
                              - containerPort: 80
                            volumeMounts:
                              - name: nginx-config
                                mountPath: /etc/nginx/conf.d/default.conf
                                subPath: default.conf
                            readinessProbe:
                              httpGet:
                                path: /
                                port: 80
                              initialDelaySeconds: 5
                              periodSeconds: 10
                              timeoutSeconds: 3
                              failureThreshold: 3
                            livenessProbe:
                              httpGet:
                                path: /
                                port: 80
                              initialDelaySeconds: 15
                              periodSeconds: 20
                              timeoutSeconds: 3
                              failureThreshold: 3
                            resources:
                              requests:
                                cpu: "50m"
                                memory: "64Mi"
                              limits:
                                cpu: "250m"
                                memory: "128Mi"
                        volumes:
                          - name: nginx-config
                            configMap:
                              name: zuri-frontend-nginx-config
                  FRONTEND
                  fi

                  echo "Reconciliation check complete."
                  kubectl -n zuri-market get deployments
                  kubectl -n zuri-market get pods --show-labels
