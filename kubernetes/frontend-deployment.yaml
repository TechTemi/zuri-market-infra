apiVersion: apps/v1
kind: Deployment
metadata:
  name: zuri-frontend
  namespace: zuri-market
  labels:
    app: zuri-frontend
    app.kubernetes.io/name: zuri-market
    app.kubernetes.io/component: frontend
    demo.zuri-market/runtime-cluster: runtime-k3s-cluster
    demo.zuri-market/initial-replicas: "1"
    demo.zuri-market/auto-scale-after: "3-minutes"
    demo.zuri-market/reconciler-managed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zuri-frontend
  template:
    metadata:
      labels:
        app: zuri-frontend
        app.kubernetes.io/name: zuri-market
        app.kubernetes.io/component: frontend
        demo.zuri-market/runtime-cluster: runtime-k3s-cluster
        demo.zuri-market/initial-replicas: "1"
    spec:
      containers:
        - name: zuri-frontend
          image: temidev/zuriapp-frontend:v2
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
      volumes:
        - name: nginx-config
          configMap:
            name: zuri-frontend-nginx-config
